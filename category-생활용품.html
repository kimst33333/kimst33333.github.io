<button id="back-to-top" type="button" aria-label="맨 위로 가기" hidden>맨 위로 ▲</button>
<div id="cookie-consent" class="cookie-consent" hidden>
  <p>이 사이트는 광고 제공 및 이용 통계를 위해 쿠키를 사용합니다.
  자세한 내용은 <a href="privacy.html">개인정보처리방침</a>에서 확인하실 수 있습니다.</p>
  <button id="cookie-consent-ok" type="button">확인했습니다</button>
</div>
<script>
(function () {
  var KEY = "cookieConsentOk";
  var el = document.getElementById("cookie-consent");
  if (!el) return;
  if (!localStorage.getItem(KEY)) { el.hidden = false; }
  document.getElementById("cookie-consent-ok").addEventListener("click", function () {
    localStorage.setItem(KEY, "1");
    el.hidden = true;
  });
})();

(function () {
  // 글자 크기 조절: 0(기본)~3단계, localStorage에 저장해서 페이지 이동해도 유지
  var KEY = "fontSizeStep";
  var MAX = 3;
  var root = document.documentElement;
  function apply(step) {
    root.style.fontSize = (100 + step * 12) + "%";
  }
  var step = parseInt(localStorage.getItem(KEY) || "0", 10);
  apply(step);
  document.getElementById("font-size-up").addEventListener("click", function () {
    step = Math.min(MAX, step + 1);
    localStorage.setItem(KEY, step);
    apply(step);
  });
  document.getElementById("font-size-down").addEventListener("click", function () {
    step = Math.max(0, step - 1);
    localStorage.setItem(KEY, step);
    apply(step);
  });
})();

(function () {
  // 맨 위로 가기: 일정 스크롤 이상 내려가면 나타남
  var btn = document.getElementById("back-to-top");
  window.addEventListener("scroll", function () {
    btn.hidden = window.scrollY < 400;
  });
  btn.addEventListener("click", function () {
    window.scrollTo({top: 0, behavior: "smooth"});
  });
})();
</script>
